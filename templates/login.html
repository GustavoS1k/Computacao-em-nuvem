<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>AbracadabraKids - Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="card">

    <h1>🎈 AbracadabraKids</h1>

    <h2>Login</h2>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Usuário"
            required>

        <input
            type="password"
            name="password"
            placeholder="Senha"
            required>

        <button type="submit">
            Entrar
        </button>

    </form>

    <br>

    <a href="/register">
        Criar conta
    </a>

</div>

</body>
</html>
